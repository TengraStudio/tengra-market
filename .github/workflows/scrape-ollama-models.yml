name: Scrape Ollama Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape Ollama models
        run: node scripts/scrape-ollama-models.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- models/ollama-models.json; then
            echo "No model changes. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models/ollama-models.json
          git commit -m "chore(models): update Ollama model index"
          git push
